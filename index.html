<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AI-powered design brief generator to practice skills, generate ideas, and build a high-quality portfolio." />
    <!-- Preload fonts to avoid layout shift -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <title>Briefify — Design Brief & Strategy Architect</title>
    <style>
      /* Graceful elegant loading layout in raw CSS for immediate rendering */
      #preloader {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        background-color: #F4F1EA;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 99999;
        font-family: 'Playfair Display', Georgia, serif;
        transition: opacity 0.4s ease-out;
      }
      .loader-container {
        text-align: center;
        max-width: 320px;
        padding: 20px;
      }
      .loader-logo {
        font-size: 2.2rem;
        font-weight: 900;
        font-style: italic;
        letter-spacing: -0.05em;
        color: #1A1A1A;
        margin-bottom: 24px;
      }
      .loader-spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(26, 26, 26, 0.1);
        border-top-color: #1A1A1A;
        border-radius: 50%;
        margin: 0 auto 16px auto;
        animation: spin 0.8s linear infinite;
      }
      .loader-text {
        font-size: 0.75rem;
        font-family: ui-sans-serif, system-ui, sans-serif;
        text-transform: uppercase;
        letter-spacing: 0.15em;
        font-weight: 700;
        color: rgba(26, 26, 26, 0.4);
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <!-- High-fidelity, elegant pre-rendered placeholder index state -->
    <div id="preloader">
      <div class="loader-container">
        <div class="loader-spinner"></div>
        <div class="loader-logo">Briefify</div>
        <div class="loader-text">Initializing Engine...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Ultimate fail-safe: make sure the preloader is faded out and deleted after 1.2 seconds under any circumstances
      setTimeout(function() {
        var preloader = document.getElementById('preloader');
        if (preloader) {
          preloader.style.opacity = '0';
          setTimeout(function() {
            if (preloader.parentNode) {
              preloader.remove();
            }
          }, 400);
        }
      }, 1200);
    </script>
  </body>
</html>
